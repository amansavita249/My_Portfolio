<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Intelligence Engine | Aman Savita</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e14;
            --surface: #121820;
            --border: #1f2937;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        /* Header UI */
        header {
            padding: 1.5rem 5%; background: rgba(10, 14, 20, 0.8);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; font-weight: 800; color: #000; }
        .brand-text { font-weight: 700; letter-spacing: -0.5px; font-size: 1.25rem; }
        
        .status-pill { background: #1e293b; border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
        .pulse { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        /* Main Grid Layout */
        main { max-width: 1400px; margin: 3rem auto; padding: 0 2rem; display: grid; grid-template-columns: 420px 1fr; gap: 2rem; }

        /* Analysis Form */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; }
        h2 { font-size: 1.125rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; color: var(--accent); }

        .field { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.5rem; }
        input, select { 
            width: 100%; background: #080c10; border: 1px solid var(--border); padding: 0.75rem 1rem; 
            color: white; border-radius: 8px; outline: none; transition: border 0.2s; font-size: 0.875rem;
        }
        input:focus { border-color: var(--accent); }

        .btn-analyze { 
            width: 100%; background: var(--accent); color: white; padding: 0.875rem; border: none; 
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: filter 0.2s;
        }
        .btn-analyze:hover { filter: brightness(1.2); }

        /* Dashboard HUD */
        .dashboard { display: none; flex-direction: column; gap: 1.5rem; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .risk-banner { padding: 1.5rem; border-radius: 12px; border: 1px solid transparent; display: flex; align-items: center; gap: 1rem; }
        .risk-banner.danger { background: rgba(239, 68, 68, 0.1); border-color: var(--danger); }
        .risk-banner.safe { background: rgba(16, 185, 129, 0.1); border-color: var(--success); }

        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .metric-box { background: var(--surface); border: 1px solid var(--border); padding: 1.25rem; border-radius: 12px; }
        .metric-box h4 { font-size: 0.7rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.5rem; letter-spacing: 0.5px; }
        .metric-box p { font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; }

        .terminal { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #64748b; line-height: 1.6; max-height: 200px; overflow-y: auto; }

        .danger-text { color: var(--danger); font-weight: bold; }
        .safe-text { color: var(--success); font-weight: bold; }

        @media (max-width: 1024px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="brand-icon">AS</div>
            <div class="brand-text">AMAN SAVITA <span style="font-weight: 300; opacity: 0.6;">LABS</span></div>
        </div>
        <div class="status-pill">
            <div class="pulse"></div>
            <span id="network-id">INITIALIZING SYSTEM...</span>
        </div>
    </header>

    <main>
        <!-- Control Center -->
        <section class="card">
            <h2><i data-lucide="shield-check"></i> Analysis Console</h2>
            
            <div class="field">
                <label>Destination URL</label>
                <input type="text" id="urlInput" placeholder="https://external-link.com/verify">
            </div>

            <div class="field">
                <label>Origin Identity (Sender)</label>
                <input type="text" id="senderName" placeholder="e.g., Support Team">
            </div>

            <div class="field">
                <label>Ingress Platform</label>
                <select id="platform">
                    <option value="">Detection: Auto</option>
                    <option value="WhatsApp">WhatsApp Encrypted</option>
                    <option value="Gmail">Gmail SMTP</option>
                    <option value="Telegram">Telegram Cloud</option>
                    <option value="SMS">Cellular Gateway</option>
                    <option value="Other">External Hook</option>
                </select>
            </div>

            <button class="btn-analyze" onclick="executeDiagnosis()">Execute AI Scan</button>
            <p style="text-align: center; font-size: 10px; color: var(--text-dim); margin-top: 2rem; font-weight: 600; letter-spacing: 1px;">© 2026 AMAN SAVITA CYBERSECURITY LAB</p>
        </section>

        <!-- Dashboard Output -->
        <section class="dashboard" id="dash">
            <div id="banner" class="risk-banner">
                <div id="riskIcon"></div>
                <div>
                    <h3 id="riskTitle" style="font-size: 1.25rem;">Checking...</h3>
                    <p id="riskMeta" style="font-size: 0.875rem; opacity: 0.8;"></p>
                </div>
            </div>

            <div class="metrics">
                <div class="metric-box">
                    <h4>IP & GEO Origin</h4>
                    <p id="m-ip">Scanning...</p>
                </div>
                <div class="metric-box">
                    <h4>TLD Reputation</h4>
                    <p id="m-tld">Analyzing...</p>
                </div>
                <div class="metric-box">
                    <h4>AI Pattern Score</h4>
                    <p id="m-ai">Calculating...</p>
                </div>
            </div>

            <div class="terminal" id="term-log">
                [SYSTEM] Awaiting packet data for analysis...<br>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--text-dim); font-size:11px; cursor:pointer; text-decoration:underline;">Reset Engine</button>
        </section>
    </main>

    <script>
        lucide.createIcons();

        // Real-Time IP Tracker Integration
        async function loadNetworkStats() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                document.getElementById('network-id').innerText = `NODE: ${data.ip} // ${data.city}, ${data.country_code}`;
                return data;
            } catch (e) {
                document.getElementById('network-id').innerText = "NODE: ENCRYPTED // LOC: UNKNOWN";
                return null;
            }
        }
        let activeNet = null;
        loadNetworkStats().then(d => activeNet = d);

        function executeDiagnosis() {
            const urlIn = document.getElementById('urlInput');
            const nameIn = document.getElementById('senderName');
            const platIn = document.getElementById('platform');

            const url = urlIn.value.trim();
            const sender = nameIn.value.trim() || "Unknown";
            const platform = platIn.value || "Unknown";

            if (!url) { alert("ERROR: Source URL is mandatory for analysis."); return; }

            const dash = document.getElementById('dash');
            const log = document.getElementById('term-log');
            dash.style.display = "flex";

            log.innerHTML += `[INFO] Initializing scan for ${url}<br>`;
            log.innerHTML += `[INFO] Origin metadata identified: ${sender} via ${platform}<br>`;

            // --- Tool 1: Real-time IP & Geo ---
            document.getElementById('m-ip').innerText = activeNet ? `${activeNet.org} // ${activeNet.city}` : "Proxy/Hidden";

            // --- Tool 2: TLD Inspector (Operational) ---
            const tld = url.split('.').pop().split('/')[0].toLowerCase();
            const badTlds = ['xyz', 'tk', 'ml', 'ga', 'cf', 'gq', 'zip', 'buzz', 'top', 'bid'];
            const tldEl = document.getElementById('m-tld');
            if (badTlds.includes(tld)) {
                tldEl.innerHTML = `<span class="danger-text">CRITICAL (Domain: .${tld})</span>`;
            } else {
                tldEl.innerHTML = `<span class="safe-text">STABLE (Domain: .${tld})</span>`;
            }

            // --- Tool 3: AI Pattern Analysis (Operational) ---
            let riskPoints = 0;
            if (!url.startsWith('https')) riskPoints += 45;
            if (/(bit\.ly|t\.co|tinyurl|tiny\.one)/.test(url)) riskPoints += 25;
            if (/(login|bank|verify|update|secure|gift|prize|free)/i.test(url)) riskPoints += 30;
            
            const aiEl = document.getElementById('m-ai');
            aiEl.innerHTML = riskPoints > 50 ? `<span class="danger-text">Malicious (${riskPoints}%)</span>` : `<span class="safe-text">Normal (${riskPoints}%)</span>`;

            // --- Final UI Transformation ---
            const banner = document.getElementById('banner');
            const title = document.getElementById('riskTitle');
            const meta = document.getElementById('riskMeta');

            if (riskPoints > 50 || badTlds.includes(tld) || !url.startsWith('https')) {
                banner.className = "risk-banner danger";
                title.innerText = "THREAT DETECTED: INSECURE";
                title.classList.add('danger-text');
                meta.innerHTML = `Origin Entity <b>${sender}</b> matched known phishing patterns via ${platform}.`;
            } else {
                banner.className = "risk-banner safe";
                title.innerText = "SECURITY CLEARED: SECURE";
                title.classList.add('safe-text');
                meta.innerHTML = `Packet verification successful. Identity: <b>${sender}</b>. Protocol: ${platform}.`;
            }

            // --- TRIPLE AUTOMATED CLEANUP (URL, Sender, Platform) ---
            setTimeout(() => {
                urlIn.value = "";
                nameIn.value = "";
                platIn.selectedIndex = 0;
                log.innerHTML += `[SUCCESS] Automated input purge completed. Privacy secured.<br>`;
                log.scrollTop = log.scrollHeight;
                lucide.createIcons();
            }, 1500);

            lucide.createIcons();
        }
    </script>
</body>
</html>
